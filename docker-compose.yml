services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: shift_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: shift_connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shift_user -d shift_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://shift_user:super_secret_password@db:5432/shift_connect
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "6010:80"
    depends_on:
      - backend